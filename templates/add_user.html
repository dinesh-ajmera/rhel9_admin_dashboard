<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}
body{
    background:#f5f7fa;
    padding:20px;
}
nav{
    background:#2c3e50;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
}
nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}
nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}
nav a:hover{
    color:#3498db;
}
h1{
    color:#c0392b;
    margin:15px 0;
}


button{
    background:#3498db;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

form{
    display:flex;
    flex-direction:column;
    gap:8px;
    padding:15px;
    background:#fff;
    border:1px solid #ddd;
    border-radius:8px;
}

form input,
form select{
    padding:8px;
    border:1px solid #ccc;
    border-radius:4px;
}
.alert-unsuccess{
    background:#f8d7da;
    color:#721c24;
    padding:12px;
    border-radius:5px;
    margin-bottom:10px;
}
.alert-success{
    background:#d4edda;
    color:#155724;
    padding:12px;
    border-radius:5px;
    margin-bottom:10px;
}
.message{
    margin:10px 0;
}


</style>


<nav>
        <ul>
                <li><a href='/add_user'> add user </a></li>
                <li><a href='/users'> users </a></li>
                <li><a href='/user_manipulation'> manipulate users </a></li>
                <li><a href='/groups'> groups </a></li>
		<li><a href='/add_group'> add group </a></li>
        </ul>
</nav>


<div>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="message">
            {% for category, message in messages %}
                <div class="alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}


        </div>

        <input type="password" name=passwd placeholder="passwd">
	<button type='submit'>add user </button>

</form>
